<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lvmino Music - R2 Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GIỮ NGUYÊN STYLE ĐẸP CỦA BẠN */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #111111, #1a1033);
            color: white; height: 100vh; overflow: hidden;
        }
        .app { display: grid; grid-template-columns: 240px 1fr 320px; height: 100vh; }
        
        /* SIDEBAR */
        .sidebar { background: rgba(255, 255, 255, 0.03); border-right: 1px solid rgba(255,255,255,0.08); padding: 30px 24px; }
        .sidebar h1 { font-size: 26px; color: #8b5cf6; margin-bottom: 5px; letter-spacing: 2px; }
        .sidebar p { color: #666; font-size: 13px; margin-bottom: 30px; }
        .menu a {
            display: flex; align-items: center; gap: 12px; color: #b3b3b3;
            text-decoration: none; padding: 12px; border-radius: 10px; transition: 0.3s;
        }
        .menu a:hover, .menu a.active { background: rgba(139, 92, 246, 0.2); color: white; }

        /* PLAYER CENTER */
        .main { display: flex; justify-content: center; align-items: center; position: relative; }
        .player-card { text-align: center; width: 100%; max-width: 400px; z-index: 10; }
        .img-box {
            width: 300px; height: 300px; margin: 0 auto 30px; position: relative;
        }
        .img-box img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: 0.5s ease;
        }
        /* Hiệu ứng đĩa quay khi phát */
        .playing .img-box img { border-radius: 50%; animation: rotate 15s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .player-card h2 { font-size: 30px; margin-bottom: 8px; text-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .player-card p { color: #a78bfa; margin-bottom: 30px; font-weight: 300; }

        /* CONTROLS */
        .controls { display: flex; flex-direction: column; gap: 20px; }
        .progress-bar { width: 100%; display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; accent-color: #8b5cf6; cursor: pointer; height: 4px; }
        .time { font-size: 12px; color: #888; font-family: monospace; }

        .buttons { display: flex; justify-content: center; align-items: center; gap: 25px; }
        .btn-main {
            width: 65px; height: 65px; border-radius: 50%; background: #8b5cf6;
            border: none; color: white; font-size: 22px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.1); background: #7c3aed; }
        .btn-sub { background: none; border: none; color: #666; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .btn-sub:hover { color: white; }

        /* PLAYLIST RIGHT */
        .playlist { background: rgba(0,0,0,0.2); border-left: 1px solid rgba(255,255,255,0.05); padding: 30px 20px; overflow-y: auto; }
        .song-item {
            padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer;
            background: rgba(255,255,255,0.02); transition: 0.2s; border: 1px solid transparent;
        }
        .song-item:hover { background: rgba(255,255,255,0.05); }
        .song-item.active { background: rgba(139, 92, 246, 0.1); border-color: rgba(139, 92, 246, 0.3); }
        .song-item strong { display: block; font-size: 14px; margin-bottom: 4px; }
        .song-item span { font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <h1>LVMINO</h1>
        <p>Designer's Playlist</p>
        <div class="menu">
            <a href="#" class="active"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="#"><i class="fas fa-music"></i> My Library</a>
            <a href="#"><i class="fas fa-cloud-upload"></i> R2 Storage</a>
        </div>
    </aside>

    <main class="main" id="player-container">
        <div class="player-card">
            <div class="img-box">
                <img id="cover" src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=500" alt="Cover">
            </div>
            <h2 id="title">Select a song</h2>
            <p id="artist">Artist Name</p>

            <div class="controls">
                <div class="progress-bar">
                    <span class="time" id="current-time">0:00</span>
                    <input type="range" id="progress" value="0">
                    <span class="time" id="duration">0:00</span>
                </div>
                <div class="buttons">
                    <button class="btn-sub" id="prev"><i class="fas fa-backward"></i></button>
                    <button class="btn-main" id="play-btn"><i id="play-icon" class="fas fa-play"></i></button>
                    <button class="btn-sub" id="next"><i class="fas fa-forward"></i></button>
                </div>
            </div>
        </div>
    </main>

    <section class="playlist">
        <h3 style="margin-bottom: 20px;">Next Up</h3>
        <div id="list"></div>
    </section>
</div>

<audio id="audio"></audio>

<script>
    // CẤU HÌNH R2 CỦA BẠN
    const BASE_URL = "https://pub-c0152066bdb542f18b3b3c9b5dc98409.r2.dev/"; // Public URL của bạn
    
    const songs = [
        { 
            name: "Bản Nhạc Buồn Piano", 
            file: "Bản%20Nhạc%20Buồn%20%20Nhạc%20Tik%20Tok%20Tâm%20Trạng%20Không%20Lời%20Piano.mp3",
            artist: "TikTok Piano",
            cover: "https://images.unsplash.com/photo-1520529611442-eaf062f88365?w=500"
        },
        // Sau khi bạn up thêm bài khác lên R2, hãy thêm vào đây:
        // { name: "Tên bài 2", file: "ten-file-tren-r2.mp3", artist: "Ca sĩ", cover: "link-anh.jpg" }
    ];

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const progress = document.getElementById('progress');
    const title = document.getElementById('title');
    const artist = document.getElementById('artist');
    const cover = document.getElementById('cover');
    const playerContainer = document.getElementById('player-container');
    const listContainer = document.getElementById('list');

    let index = 0;
    let isPlaying = false;

    function init() {
        listContainer.innerHTML = songs.map((s, i) => `
            <div class="song-item ${i === index ? 'active' : ''}" onclick="playSpecific(${i})">
                <strong>${s.name}</strong>
                <span>${s.artist}</span>
            </div>
        `).join('');
        
        const current = songs[index];
        title.innerText = current.name;
        artist.innerText = current.artist;
        cover.src = current.cover;
        audio.src = BASE_URL + current.file;
    }

    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            playIcon.className = "fas fa-play";
            playerContainer.classList.remove('playing');
        } else {
            audio.play();
            playIcon.className = "fas fa-pause";
            playerContainer.classList.add('playing');
        }
        isPlaying = !isPlaying;
    }

    function playSpecific(i) {
        index = i;
        init();
        isPlaying = false;
        togglePlay();
    }

    playBtn.onclick = togglePlay;
    document.getElementById('next').onclick = () => playSpecific((index + 1) % songs.length);
    document.getElementById('prev').onclick = () => playSpecific((index - 1 + songs.length) % songs.length);

    audio.ontimeupdate = () => {
        const p = (audio.currentTime / audio.duration) * 100;
        progress.value = p || 0;
        document.getElementById('current-time').innerText = formatTime(audio.currentTime);
        document.getElementById('duration').innerText = formatTime(audio.duration || 0);
    };

    progress.oninput = () => audio.currentTime = (progress.value / 100) * audio.duration;

    function formatTime(s) {
        let m = Math.floor(s / 60);
        let sec = Math.floor(s % 60);
        return `${m}:${sec < 10 ? '0' + sec : sec}`;
    }

    init();
</script>
</body>
</html>
