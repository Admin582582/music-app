<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lvmino Music Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS CỦA BẠN ĐÃ ĐƯỢC TỐI ƯU THÊM MỘT CHÚT */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #111111, #1a1033);
            color: white;
            overflow: hidden; /* Giữ layout cố định */
        }

        .app {
            display: grid;
            grid-template-columns: 240px 1fr 350px;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            background: rgba(255, 255, 255, 0.02);
            border-right: 1px solid rgba(255,255,255,0.08);
            padding: 30px 24px;
        }

        .sidebar h1 { font-size: 24px; margin-bottom: 8px; letter-spacing: 1px; color: #8b5cf6; }
        .sidebar p { color: #8b8b8b; margin-bottom: 32px; font-size: 14px; }

        .menu { display: flex; flex-direction: column; gap: 8px; }
        .menu a {
            color: #d1d1d1;
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 12px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu a:hover, .menu a.active {
            background: rgba(139, 92, 246, 0.15);
            color: #a78bfa;
        }

        /* MAIN PLAYER */
        .main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
        }

        .player-card { text-align: center; width: 100%; max-width: 420px; }
        .player-card img {
            width: 320px;
            height: 320px;
            object-fit: cover;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .playing img { transform: scale(1.05); border: 2px solid rgba(139, 92, 246, 0.3); }

        .player-card h2 { font-size: 32px; margin-bottom: 8px; font-weight: 700; }
        .player-card p { color: #b3b3b3; margin-bottom: 25px; font-size: 18px; }

        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 20px; }
        
        .btn-circle {
            width: 56px; height: 56px; border-radius: 50%;
            background: #8b5cf6; color: white; border: none;
            cursor: pointer; font-size: 20px; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-circle:hover { transform: scale(1.1); background: #7c3aed; }
        
        .btn-ghost {
            background: transparent; color: #b3b3b3; font-size: 22px;
            cursor: pointer; border: none; transition: 0.2s;
        }
        .btn-ghost:hover { color: white; }

        /* PLAYLIST */
        .playlist {
            border-left: 1px solid rgba(255,255,255,0.08);
            background: rgba(0, 0, 0, 0.2);
            padding: 30px 24px;
            overflow-y: auto;
        }

        .playlist h3 { margin-bottom: 20px; font-size: 20px; font-weight: 600; }

        .song-item {
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.03);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .song-item:hover { background: rgba(255,255,255,0.08); }
        .song-item.active {
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        .song-item strong { display: block; font-size: 15px; color: #efefef; }
        .song-item span { color: #8b8b8b; font-size: 13px; }

        /* Seekbar */
        .progress-container { width: 100%; margin-top: 10px; }
        input[type="range"] {
            width: 100%; accent-color: #8b5cf6; cursor: pointer; height: 4px;
        }
    </style>
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <h1>LVMINO</h1>
        <p>Indie Music Hub</p>
        <nav class="menu">
            <a href="#" class="active"><i class="fas fa-home"></i> Khám phá</a>
            <a href="#"><i class="fas fa-compact-disc"></i> Album</a>
            <a href="#"><i class="fas fa-heart"></i> Yêu thích</a>
            <a href="#"><i class="fas fa-gear"></i> Cài đặt</a>
        </nav>
    </aside>

    <main class="main" id="main-player">
        <div class="player-card">
            <img id="cover" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500" alt="Cover">
            <h2 id="title">Tên bài hát</h2>
            <p id="artist">Nghệ sĩ</p>
            
            <div class="progress-container">
                <input type="range" id="progress" value="0">
            </div>

            <div class="controls">
                <button class="btn-ghost" id="prev"><i class="fas fa-backward-step"></i></button>
                <button class="btn-circle" id="play-btn">
                    <i id="play-icon" class="fas fa-play"></i>
                </button>
                <button class="btn-ghost" id="next"><i class="fas fa-forward-step"></i></button>
            </div>
        </div>
    </main>

    <section class="playlist">
        <h3>Danh sách phát</h3>
        <div id="playlist-list">
            </div>
    </section>
</div>

<audio id="audio"></audio>

<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const progress = document.getElementById('progress');
    const title = document.getElementById('title');
    const artist = document.getElementById('artist');
    const cover = document.getElementById('cover');
    const mainPlayer = document.getElementById('main-player');
    const playlistContainer = document.getElementById('playlist-list');

    const songs = [
        { name: 'Ghé Qua', artist: 'Dick x PC x Tofu', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', cover: 'https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=500' },
        { name: 'Lạ Lùng', artist: 'Vũ', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', cover: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=500' },
        { name: 'Bao Tiền Một Mớ Bình Yên', artist: '14 Casper', src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3', cover: 'https://images.unsplash.com/photo-1514525253361-bee8718a300a?w=500' }
    ];

    let songIndex = 0;
    let isPlaying = false;

    // Render Playlist
    function renderPlaylist() {
        playlistContainer.innerHTML = songs.map((song, index) => `
            <div class="song-item ${index === songIndex ? 'active' : ''}" onclick="selectSong(${index})">
                <div>
                    <strong>${song.name}</strong>
                    <span>${song.artist}</span>
                </div>
                <i class="fas ${index === songIndex && isPlaying ? 'fa-volume-high' : 'fa-play'}"></i>
            </div>
        `).join('');
    }

    function loadSong(song) {
        title.innerText = song.name;
        artist.innerText = song.artist;
        audio.src = song.src;
        cover.src = song.cover;
        renderPlaylist();
    }

    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            playIcon.classList.replace('fa-pause', 'fa-play');
            mainPlayer.classList.remove('playing');
        } else {
            audio.play();
            isPlaying = true;
            playIcon.classList.replace('fa-play', 'fa-pause');
            mainPlayer.classList.add('playing');
        }
        renderPlaylist();
    }

    function selectSong(index) {
        songIndex = index;
        loadSong(songs[songIndex]);
        togglePlay();
        if(!isPlaying) togglePlay(); // Force play
    }

    playBtn.addEventListener('click', togglePlay);

    document.getElementById('next').addEventListener('click', () => {
        songIndex = (songIndex + 1) % songs.length;
        loadSong(songs[songIndex]);
        if(isPlaying) audio.play();
    });

    document.getElementById('prev').addEventListener('click', () => {
        songIndex = (songIndex - 1 + songs.length) % songs.length;
        loadSong(songs[songIndex]);
        if(isPlaying) audio.play();
    });

    audio.ontimeupdate = () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        progress.value = pct || 0;
    };

    progress.oninput = () => {
        audio.currentTime = (progress.value / 100) * audio.duration;
    };

    // Khởi tạo bài đầu
    loadSong(songs[songIndex]);
</script>

</body>
</html>
