<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lvmino Music - R2 Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS THEO STYLE CỦA LUC VAN */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #111111, #1a1033);
            color: white;
            height: 100vh;
            overflow: hidden;
        }
        .app {
            display: grid;
            grid-template-columns: 220px 1fr 320px;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            background: rgba(255, 255, 255, 0.04);
            border-right: 1px solid rgba(255,255,255,0.08);
            padding: 24px;
        }
        .sidebar h1 { font-size: 28px; margin-bottom: 10px; color: #8b5cf6; }
        .sidebar p { color: #b3b3b3; margin-bottom: 24px; }
        .menu a {
            color: white; text-decoration: none; padding: 12px 14px;
            border-radius: 12px; background: rgba(255,255,255,0.04);
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
        }
        .menu a:hover { background: rgba(139, 92, 246, 0.25); }

        /* MAIN PLAYER */
        .main {
            display: flex; justify-content: center; align-items: center;
            padding: 40px; background: radial-gradient(circle, rgba(139, 92, 246, 0.1), transparent);
        }
        .player-card { text-align: center; width: 100%; max-width: 420px; }
        
        .img-wrap {
            width: 320px; height: 320px; margin: 0 auto 24px;
            position: relative;
        }
        .player-card img {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: border-radius 0.5s, transform 0.5s;
        }
        
        /* Hiệu ứng xoay khi đang phát nhạc */
        .playing img {
            border-radius: 50%;
            animation: rotateCD 12s linear infinite;
        }
        @keyframes rotateCD { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .player-card h2 { font-size: 34px; margin-bottom: 10px; }
        .player-card p { color: #b3b3b3; margin-bottom: 20px; }

        /* CONTROLS */
        .controls { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .progress-area { width: 100%; display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; accent-color: #8b5cf6; cursor: pointer; }
        .time { font-size: 12px; color: #888; font-family: monospace; }

        .btn-group { display: flex; align-items: center; gap: 25px; }
        button#play-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: #8b5cf6; color: white; border: none;
            font-size: 20px; cursor: pointer; transition: 0.3s;
        }
        button#play-btn:hover { transform: scale(1.1); background: #7c3aed; }
        .nav-btn { background: none; border: none; color: #b3b3b3; font-size: 20px; cursor: pointer; }

        /* PLAYLIST */
        .playlist {
            border-left: 1px solid rgba(255,255,255,0.08);
            background: rgba(255, 255, 255, 0.03);
            padding: 24px; overflow-y: auto;
        }
        .song-item {
            padding: 14px; border-radius: 14px; margin-bottom: 12px;
            background: rgba(255,255,255,0.04); cursor: pointer; transition: 0.2s;
        }
        .song-item.active { background: rgba(139, 92, 246, 0.22); border: 1px solid #8b5cf6; }
        .song-item strong { display: block; }
        .song-item span { color: #b3b3b3; font-size: 13px; }
    </style>
</head>
<body>

<div class="app" id="app-container">
    <aside class="sidebar">
        <h1>LVMINO</h1>
        <p>Studio Playlist</p>
        <div class="menu">
            <a href="#"><i class="fas fa-music"></i> Thư viện</a>
            <a href="#"><i class="fas fa-cloud"></i> R2 Store</a>
        </div>
    </aside>

    <main class="main">
        <div class="player-card">
            <div class="img-wrap">
                <img id="cover" src="https://images.unsplash.com/photo-1520529611442-eaf062f88365?w=500" alt="Cover">
            </div>
            <h2 id="title">Đang tải...</h2>
            <p id="artist">Nghệ sĩ</p>
            
            <div class="controls">
                <div class="progress-area">
                    <span class="time" id="cur-time">0:00</span>
                    <input type="range" id="progress" value="0">
                    <span class="time" id="dur-time">0:00</span>
                </div>
                <div class="btn-group">
                    <button class="nav-btn" id="prev"><i class="fas fa-step-backward"></i></button>
                    <button id="play-btn"><i id="play-icon" class="fas fa-play"></i></button>
                    <button class="nav-btn" id="next"><i class="fas fa-step-forward"></i></button>
                </div>
            </div>
        </div>
    </main>

    <section class="playlist">
        <h3 style="margin-bottom: 20px;">Danh sách phát</h3>
        <div id="list-render"></div>
    </section>
</div>

<audio id="main-audio"></audio>

<script>
    const audio = document.getElementById('main-audio');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const progress = document.getElementById('progress');
    const appContainer = document.getElementById('app-container');
    
    // DANH SÁCH NHẠC (ĐÃ THÊM LINK R2 CỦA BẠN)
    const songs = [
        { 
            name: 'Piano Tâm Trạng', 
            artist: 'TikTok Piano', 
            src: 'https://pub-c0152066bdb542f18b3b3c9b5dc98409.r2.dev/B%E1%BA%A3n%20Nh%E1%BA%A1c%20Bu%E1%BB%93n%20%20Nh%E1%BA%A1c%20Tik%20Tok%20T%C3%A2m%20Tr%E1%BA%A1ng%20Kh%C3%B4ng%20L%E1%BB%9Di%20Piano.mp3', 
            cover: 'https://images.unsplash.com/photo-1520529611442-eaf062f88365?w=500' 
        },
        { 
            name: 'Indie Vibe (Demo)', 
            artist: 'Lvmino Artist', 
            src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', 
            cover: 'https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=500' 
        }
    ];

    let songIndex = 0;
    let isPlaying = false;

    function loadSong(song) {
        document.getElementById('title').innerText = song.name;
        document.getElementById('artist').innerText = song.artist;
        document.getElementById('cover').src = song.cover;
        audio.src = song.src;
        renderPlaylist();
    }

    function renderPlaylist() {
        document.getElementById('list-render').innerHTML = songs.map((s, i) => `
            <div class="song-item ${i === songIndex ? 'active' : ''}" onclick="changeSong(${i})">
                <strong>${s.name}</strong>
                <span>${s.artist}</span>
            </div>
        `).join('');
    }

    function playPause() {
        if (isPlaying) {
            audio.pause();
            playIcon.className = 'fas fa-play';
            appContainer.classList.remove('playing');
        } else {
            audio.play();
            playIcon.className = 'fas fa-pause';
            appContainer.classList.add('playing');
        }
        isPlaying = !isPlaying;
    }

    function changeSong(i) {
        songIndex = i;
        loadSong(songs[songIndex]);
        isPlaying = false;
        playPause();
    }

    playBtn.onclick = playPause;
    document.getElementById('next').onclick = () => changeSong((songIndex + 1) % songs.length);
    document.getElementById('prev').onclick = () => changeSong((songIndex - 1 + songs.length) % songs.length);

    audio.ontimeupdate = () => {
        if (audio.duration) {
            progress.value = (audio.currentTime / audio.duration) * 100;
            document.getElementById('cur-time').innerText = formatTime(audio.currentTime);
            document.getElementById('dur-time').innerText = formatTime(audio.duration);
        }
    };

    progress.oninput = () => audio.currentTime = (progress.value / 100) * audio.duration;
    
    function formatTime(sec) {
        let m = Math.floor(sec / 60);
        let s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' + s : s}`;
    }

    // Khởi động
    loadSong(songs[songIndex]);
</script>
</body>
</html>
