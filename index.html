<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>My Music</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
      <h1>🎵 My Music</h1>
      <p>Cloudflare R2 Player</p>

      <div class="menu">
        <a href="#">Trang chủ</a>
        <a href="#">Playlist</a>
        <a href="#">Yêu thích</a>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="player-card">
        <img src="https://picsum.photos/400" />
        <h2>Bản Nhạc Buồn</h2>
        <p>Nhạc của bạn</p>

        <div class="controls">
          <button id="playBtn">▶ Play</button>

          <audio id="player" controls>
            <source src="https://pub-c0152066bdb542f18b3b3c9b5dc98409.r2.dev/B%E1%BA%A3n%20Nh%E1%BA%A1c%20Bu%E1%BB%93n%20%20Nh%E1%BA%A1c%20Tik%20Tok%20T%C3%A2m%20Tr%E1%BA%A1ng%20Kh%C3%B4ng%20L%E1%BB%9Di%20Piano.mp3">
          </audio>
        </div>
      </div>
    </div>

    <!-- Playlist -->
    <div class="playlist">
      <h3>Playlist</h3>

      <div class="song-item active">
        <strong>Bản Nhạc Buồn</strong>
        <span>Đang phát</span>
      </div>

      <div class="song-item">
        <strong>Bài khác</strong>
        <span>Chưa phát</span>
      </div>
    </div>

  </div>

  <script>
    const btn = document.getElementById("playBtn");
    const player = document.getElementById("player");

    btn.onclick = () => player.play();
  </script>

</body>
</html>
